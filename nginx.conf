user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basics ──────────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/json;
    charset       utf-8;

    # ── Logging ─────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ─────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types        application/json text/plain text/css application/javascript;

    # ── Upstream ────────────────────────────────────────────────────────────────
    upstream hypixel_proxy {
        server proxy:3000;
        keepalive 64;
    }

    # ── Rate Limiting ───────────────────────────────────────────────────────────
    # Use $http_cf_connecting_ip when behind Cloudflare, fallback to $remote_addr
    map $http_cf_connecting_ip $real_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    limit_req_zone  $real_ip  zone=api:10m  rate=30r/m;
    limit_req_status 429;

    # ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name hypixel.blue-link.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name hypixel.blue-link.net;

        # ── SSL / TLS ──────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # HSTS (only if NOT using Cloudflare full proxy; CF handles it otherwise)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security Headers ───────────────────────────────────────────────────
        add_header X-Content-Type-Options    "nosniff"          always;
        add_header X-Frame-Options           "DENY"             always;
        add_header X-XSS-Protection          "1; mode=block"    always;
        add_header Referrer-Policy           "no-referrer"      always;
        add_header Permissions-Policy        "geolocation=()"   always;

        # ── Rate Limit ────────────────────────────────────────────────────────
        limit_req zone=api burst=20 nodelay;

        # ── Health (no rate limit override) ───────────────────────────────────
        location = /health {
            proxy_pass         http://hypixel_proxy;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_read_timeout 10s;
            access_log off;
        }

        # ── API Proxy ─────────────────────────────────────────────────────────
        location /v2/ {
            proxy_pass         http://hypixel_proxy;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $real_ip;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    15s;
            proxy_read_timeout    15s;

            # Pass cache/latency headers downstream to clients
            proxy_pass_header  X-Cache;
            proxy_pass_header  X-Latency-Ms;
            proxy_pass_header  X-Timestamp;

            # Rate limit headers
            proxy_pass_header  X-RateLimit-Limit;
            proxy_pass_header  X-RateLimit-Remaining;
            proxy_pass_header  X-RateLimit-Reset;
        }

        # ── Block everything else ─────────────────────────────────────────────
        location / {
            return 404 '{"success":false,"cause":"not_found","message":"Not found."}';
            add_header Content-Type application/json always;
        }
    }
}
